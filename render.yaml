services:
  - type: web
    name: 25caratcrm
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    preDeployCommand: python manage.py migrate --noinput
    startCommand: gunicorn 25caratcrm.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: two5caratcrm.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: 25caratcrm-db
          property: connectionString

databases:
  - name: 25caratcrm-db
    plan: free
